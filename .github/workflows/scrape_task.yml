name: PubMed Continuous Scraper

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'PubMed Search Query'
        required: false
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install biopython

      - name: Run Scraper
        # Using environment variables is the safest way to handle special characters
        env:
          INPUT_QUERY: ${{ github.event.inputs.search_query }}
        run: |
          if [ ! -z "$INPUT_QUERY" ]; then
            echo "$INPUT_QUERY" > last_query.txt
            echo "0" > checkpoint.txt
            rm -f leads.csv
          fi
          python scraper.py

      - name: Update README Dashboard
        run: |
          if [ -f leads.csv ]; then
            COUNT=$(($(wc -l < leads.csv) - 1))
            sed -i "s/\*\*Total Unique Leads:\*\* [0-9]*/\*\*Total Unique Leads:\*\* $COUNT/" README.md
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update leads and dashboard [skip ci]" || exit 0
          git push
