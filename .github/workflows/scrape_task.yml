name: BPL Fortress Sync
on:
  repository_dispatch:
    types: [manual_trigger_from_sheet]
  workflow_dispatch:

jobs:
  run-hunt:
    runs-on: ubuntu-latest
    permissions: {contents: write}
    steps:
      - uses: actions/checkout@v3
      - name: Setup & Scrape
        env:
          QUERY: ${{ github.event.client_payload.query }}
          START: ${{ github.event.client_payload.start_year }}
          END: ${{ github.event.client_payload.end_year }}
        run: |
          # Write incoming parameters to memory files
          if [[ -n "$QUERY" ]]; then
            echo "$QUERY" > last_query.txt
            echo "$START" > start_year_limit.txt
            echo "$END" > year_checkpoint.txt
          fi
          pip install -r requirements.txt
          python scraper.py
      - name: Commit Leads & Checkpoint
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "BPL_Bot"
          git add leads.csv last_query.txt year_checkpoint.txt start_year_limit.txt
          git commit -m "BPL Data Update: $(cat year_checkpoint.txt) [skip ci]" || exit 0
          git push origin main
