name: PubMed Continuous Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *' # Automatically runs every 10 minutes

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install biopython

      - name: Run Scraper
        id: run_scraper
        run: |
          python scraper.py > output.log
          cat output.log
          if grep -q "FINISHED" output.log; then
            echo "completed=true" >> $GITHUB_OUTPUT
          else
            echo "completed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update Lead Count in README
        if: success()
        run: |
          if [ -f leads.csv ]; then
            COUNT=$(($(wc -l < leads.csv) - 1))
            # Create or update the 'Total Unique Leads' line
            if grep -q "Total Unique Leads:" README.md; then
              sed -i "s/^Total Unique Leads: .*/Total Unique Leads: $COUNT/" README.md
            else
              echo -e "Total Unique Leads: $COUNT\n\n$(cat README.md)" > README.md
            fi
          fi

      - name: Commit and Push Changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update leads, checkpoint, and README [skip ci]" || exit 0
          git push
