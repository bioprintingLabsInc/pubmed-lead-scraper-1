name: PubMed Continuous Scraper

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      search_query:
        description: 'Manual Search Keywords'
        required: false
  repository_dispatch:
    # UPDATED: Added 'manual_trigger_from_sheet' to hear the Google Sheet
    types: [manual_trigger_from_sheet, next_batch] 
  schedule:
    - cron: '*/20 * * * *' 

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Process Trigger
        if: github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'scraper-trigger')
        run: |
          QUERY=$(echo "${{ github.event.issue.body }}" | grep -A 1 "### PubMed Keywords" | tail -n 1)
          echo "FINAL_QUERY=$QUERY" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Engine
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          # UPDATED: This now looks for the 'query' payload sent from your Google Sheet B8 cell
          QUERY_TO_USE: ${{ env.FINAL_QUERY || github.event.inputs.search_query || github.event.client_payload.query }}
        run: |
          if [[ -n "$QUERY_TO_USE" ]]; then
            echo "$QUERY_TO_USE" > last_query.txt
            echo "0" > checkpoint.txt
            echo "2026" > year_checkpoint.txt
            # Ensure headers match your Google Sheet Sync logic
            echo "Title,Author Name,Email,Institution,Journal,Year" > leads.csv
          fi
          pip install biopython pandas
          python scraper.py

      - name: Sync Dashboard & Push
        run: |
          COUNT=$(grep -c "@" leads.csv || echo 0)
          sed -i "s/Total Unique Leads: [0-9]*/Total Unique Leads: $COUNT/" README.md
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git pull --rebase origin main
          git add .
          git commit -m "Live Update from Sheet Search: $COUNT leads [skip ci]" || exit 0
          git push origin main

      - name: Auto-Trigger Next Batch
        if: env.STATUS != 'DONE'
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: next_batch
