name: Run PubMed Scraper Daily

on:
  schedule:
    - cron: '0 0 * * *' # Runs automatically at midnight every day
  workflow_dispatch: # Allows you to run it manually with a button

jobs:
  build:
    runs-on: ubuntu-latest
    
    # This section gives the script permission to write the CSV file to your repo
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install biopython pandas

      - name: Run script
        # This is the critical environment variable section
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scraper.py

      - name: Save CSV back to GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add leads.csv
          # This avoids an error if no new leads were found
          git commit -m "Auto-update leads" || exit 0
          git push
