name: PubMed Continuous Scraper

on:
  workflow_dispatch: # Allows manual start
  push:
    paths:
      - 'trigger.txt' # Run if we change this file

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install biopython

      - name: Run Scraper
        id: run_scraper
        run: |
          python scraper.py > output.log
          cat output.log
          # Check if the log says we are finished
          if grep -q "FINISHED" output.log; then
            echo "completed=true" >> $GITHUB_OUTPUT
          else
            echo "completed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update leads and checkpoint" || exit 0
          git push

      - name: Loop Next Batch
        if: steps.run_scraper.outputs.completed == 'false'
        run: |
          sleep 10
          echo $(date) > trigger.txt
          git add trigger.txt
          git commit -m "Triggering next batch"
          git push
