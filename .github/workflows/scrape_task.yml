name: PubMed Continuous Scraper # This fixes your sidebar name

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Enter PubMed Search Keyword'
        required: true
        default: '("immuno-oncology" OR "tumor immunology")'
  repository_dispatch:
    types: [next_batch]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install biopython pandas

      - name: Run Scraper
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          SEARCH_KEYWORD: ${{ github.event.inputs.keyword || github.event.client_payload.keyword }}
        run: python scraper.py

      - name: Save Data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Updated leads" || exit 0
          git push

      - name: Loop Next Batch
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.MY_GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/scrape_task.yml/dispatches \
          -d '{"ref":"main", "inputs": {"keyword": "${{ github.event.inputs.keyword || github.event.client_payload.keyword }}"}}'
