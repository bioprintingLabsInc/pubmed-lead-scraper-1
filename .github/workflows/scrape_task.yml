name: PubMed Continuous Scraper

on:
  workflow_dispatch:
    inputs:
      search_query:
        description: 'PubMed Search Query'
        required: false
  repository_dispatch:
    types: [next_batch]
  schedule:
    - cron: '*/20 * * * *' # Backup timer

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install biopython pandas

      - name: Run Scraper
        env:
          INPUT_QUERY: ${{ github.event.inputs.search_query }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}  # This pulls from GitHub Secrets
        run: |
          if [ ! -z "$INPUT_QUERY" ]; then
            echo "$INPUT_QUERY" > last_query.txt
            echo "0" > checkpoint.txt
          fi
          python scraper.py > output.log
          cat output.log
          if grep -q "FINISHED" output.log; then
            echo "STATUS=DONE" >> $GITHUB_ENV
          else
            echo "STATUS=CONTINUE" >> $GITHUB_ENV
          fi

      - name: Update README Dashboard
        run: |
          if [ -f leads.csv ]; then
            COUNT=$(grep -c "@" leads.csv || echo 0) 
            sed -i "s/\*\*Total Unique Leads:\*\* [0-9]*/\*\*Total Unique Leads:\*\* $COUNT/" README.md
          fi

      - name: Commit and Push (Conflict Protection)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          
          git stash
          git pull --rebase origin main
          git stash pop || echo "No local changes to re-apply"
          
          git add .
          git commit -m "Update Leads and Checkpoint [skip ci]" || exit 0
          git push
          
      - name: Auto-Trigger Next Batch
        if: env.STATUS == 'CONTINUE'
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: next_batch
