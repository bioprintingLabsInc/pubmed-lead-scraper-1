name: PubMed Continuous Scraper

on:
  workflow_dispatch: # Allows you to start it manually
  schedule:
    - cron: '*/10 * * * *' # Automatically runs every 10 minutes

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install biopython

      - name: Run Scraper
        id: run_scraper
        run: |
          python scraper.py > output.log
          cat output.log
          if grep -q "FINISHED" output.log; then
            echo "completed=true" >> $GITHUB_OUTPUT
          else
            echo "completed=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push Changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update leads and checkpoint [skip ci]" || exit 0
          git push
