name: PubMed Deep-Dive Scraper

on:
  repository_dispatch:
    # Only wakes up when the Google Sheet "Trial Run" sends the signal
    types: [manual_trigger_from_sheet, next_batch] 
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Run Engine
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          # Captures the keyword from your Google Sheet B8 cell
          QUERY_TO_USE: ${{ github.event.client_payload.query }}
        run: |
          # If a new query arrives from the Sheet, reset the search to 2026
          if [[ -n "$QUERY_TO_USE" ]]; then
            echo "$QUERY_TO_USE" > last_query.txt
            echo "0" > checkpoint.txt
            echo "2026" > year_checkpoint.txt
            echo "Title,Author Name,Email,Institution,Journal,Year" > leads.csv
          fi
          
          pip install biopython pandas
          python scraper.py

      - name: Save & Push Progress
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Progress Update: $(cat year_checkpoint.txt) [skip ci]" || exit 0
          git push origin main

      - name: Batching Logic (Stop at 2020)
        run: |
          CURRENT_YEAR=$(cat year_checkpoint.txt)
          # Stop condition: If we drop below 2020, we don't trigger the next batch
          if [ "$CURRENT_YEAR" -lt 2020 ]; then
            echo "MISSION_COMPLETE=true" >> $GITHUB_ENV
          else
            echo "MISSION_COMPLETE=false" >> $GITHUB_ENV
          fi

      - name: Trigger Next Batch
        if: env.MISSION_COMPLETE == 'false'
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: next_batch
